<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o amor da minha vida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="start-trigger" id="startBtn"></div>

        <div class="left-panel main-content">
            <div id="text-container"></div>
            
            <div id="photo-container">
                <img src="foto.jpg" alt="Nosso momento">
            </div>

            <div class="counter-box">
                <p class="counter-title">Meu amor por você começou há...</p>
                <div id="clock">
                    <span id="days">0</span> dias 
                    <span id="hours">0</span> horas 
                    <span id="minutes">0</span> minutos 
                    <span id="seconds">0</span> segundos
                </div>
            </div>
        </div>

        <div class="right-panel main-content">
            <canvas id="treeCanvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
